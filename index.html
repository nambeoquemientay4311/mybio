<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Hoài Nam - Bio</title>
    
    <script>
        // CẤU HÌNH THÔNG TIN - HÃY KIỂM TRA KỸ TÊN FILE (CHỮ HOA/THƯỜNG)
        const USER_CONFIG = {
            userName: "Nguyễn Hoài Nam",
            videoFile: "./bg-video.mp4", // Thêm ./ để ép đọc đúng thư mục gốc
            musicFile: "./music.mp3",    
            links: [
                { label: "TIKTOK (ACC PHỤ)", url: "https://www.tiktok.com/@hnamnthichtin" },
                { label: "THREAD",           url: "https://www.threads.com/@ivan_namnefen" },
                { label: "INSTAGRAM",        url: "https://www.instagram.com/hnamn_bel" },
                { label: "TIKTOK",           url: "https://www.tiktok.com/@hnamnmetinhoc" },
                { label: "YOUTUBE",          url: "https://www.youtube.com/@thichhoctin-y6n" },
                { label: "LOCKET",           url: "https://locket.cam/pitagoisthebest4311" }
            ]
        };
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --army-green: #2d3926;
            --gold: #ffcc00;
            --dark-overlay: rgba(0, 0, 0, 0.65);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            overflow: hidden; font-family: 'Roboto Condensed', sans-serif;
            background-color: #000;
        }

        /* Ép video phủ kín màn hình */
        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -2; transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--dark-overlay);
            z-index: -1;
        }

        .container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; color: var(--gold);
            position: relative; z-index: 10;
        }

        .star-main { font-size: 35px; color: var(--gold); text-shadow: 0 0 15px var(--gold); }

        h1 {
            font-size: 2.5rem; text-transform: uppercase;
            margin: 15px 0 35px; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
            animation: breathe 3s infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
        }

        .links-container { width: 85%; max-width: 400px; }

        .btn {
            display: block; background: var(--army-green);
            color: var(--gold); text-decoration: none;
            padding: 16px; margin: 15px 0;
            border-radius: 50px; border: 2px solid var(--gold);
            font-weight: bold; text-transform: uppercase;
            text-align: center; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            opacity: 0; animation: fadeInUp 0.5s ease forwards;
        }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .btn:hover {
            background: var(--gold); color: var(--army-green);
            box-shadow: 0 0 20px var(--gold); transform: scale(1.05);
        }

        #mute-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.6); color: var(--gold);
            border: 1px solid var(--gold); padding: 10px 20px;
            border-radius: 30px; cursor: pointer; z-index: 100;
        }

        /* Sao bay nền */
        .star { position: absolute; color: var(--gold); opacity: 0; animation: starMove linear infinite; pointer-events: none; }
        @keyframes starMove {
            0% { transform: translateY(105vh); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-5vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video" preload="auto">
        <source src="" id="v-src" type="video/mp4">
    </video>

    <div class="overlay"></div>
    <div id="star-field"></div>
    
    <audio id="bg-music" loop preload="auto">
        <source src="" id="m-src" type="audio/mpeg">
    </audio>

    <button id="mute-btn">🔇 TẮT NHẠC</button>

    <div class="container">
        <div class="star-main">★</div>
        <h1 id="display-name"></h1>
        <div class="links-container" id="links-list"></div>
    </div>

    <script>
        // Khởi tạo dữ liệu
        const v = document.getElementById('bg-video');
        const m = document.getElementById('bg-music');
        const vSrc = document.getElementById('v-src');
        const mSrc = document.getElementById('m-src');

        document.getElementById('display-name').innerText = USER_CONFIG.userName;
        
        // Gán link file và ép trình duyệt load lại
        vSrc.src = USER_CONFIG.videoFile;
        mSrc.src = USER_CONFIG.musicFile;
        v.load();
        m.load();

        // Tạo nút bấm
        const list = document.getElementById('links-list');
        USER_CONFIG.links.forEach((l, i) => {
            const a = document.createElement('a');
            a.href = l.url; a.className = 'btn'; a.target = "_blank"; a.innerText = l.label;
            a.style.animationDelay = (i * 0.15) + "s";
            list.appendChild(a);
        });

        // Tạo hiệu ứng sao
        for(let i=0; i<12; i++) {
            let s = document.createElement('div');
            s.className = 'star'; s.innerText = '★';
            s.style.left = Math.random()*100 + "vw";
            s.style.animationDuration = (Math.random()*4 + 4) + "s";
            s.style.animationDelay = (Math.random()*5) + "s";
            document.getElementById('star-field').appendChild(s);
        }

        // Xử lý Audio & Video Playback
        const btn = document.getElementById('mute-btn');
        let audioStarted = false;

        const startMedia = () => {
            if (!audioStarted) {
                v.play().catch(e => console.log("Video chờ tương tác"));
                m.play().then(() => {
                    audioStarted = true;
                    btn.innerText = "🔊 NHẠC ĐANG PHÁT";
                }).catch(e => console.log("Audio chờ tương tác"));
            }
        };

        // Lắng nghe click toàn trang để kích hoạt
        document.body.addEventListener('click', startMedia, { once: true });

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (m.paused) { m.play(); btn.innerText = "🔊 NHẠC ĐANG PHÁT"; }
            else { m.pause(); btn.innerText = "🔇 ĐÃ TẮT NHẠC"; }
        });

        // Ép video luôn chạy ngay cả khi trình duyệt cố tạm dừng
        setInterval(() => { if (v.paused) v.play(); }, 1000);
    </script>
</body>
</html>
