<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Hoài Nam - Bio</title>
    
    <script>
        const USER_CONFIG = {
            userName: "Nguyễn Hoài Nam",
            videoFile: "bg-video.mp4",
            musicFile: "music.mp3",
            links: [
                { label: "TIKTOK (ACC PHỤ)", url: "https://www.tiktok.com/@hnamnthichtin" },
                { label: "THREAD",           url: "https://www.threads.com/@ivan_namnefen" },
                { label: "INSTAGRAM",        url: "https://www.instagram.com/hnamn_bel" },
                { label: "TIKTOK",           url: "https://www.tiktok.com/@hnamnmetinhoc" },
                { label: "YOUTUBE",          url: "https://www.youtube.com/@thichhoctin-y6n" },
                { label: "LOCKET",           url: "https://locket.cam/pitagoisthebest4311" }
            ]
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --army-green: rgba(45, 57, 38, 0.8);
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.4);
            --dark-overlay: rgba(0, 0, 0, 0.7);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            overflow: hidden; font-family: 'Roboto Condensed', sans-serif;
            background-color: #000;
        }

        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -2; transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.6);
        }

        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--dark-overlay);
            z-index: -1;
        }

        /* Hiệu ứng quét màn hình */
        .overlay::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        .container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; color: var(--gold);
            position: relative; z-index: 10;
            padding: 20px; box-sizing: border-box;
        }

        h1 {
            font-size: 2.2rem; text-transform: uppercase;
            margin: 20px 0 30px; letter-spacing: 4px;
            text-shadow: 0 0 15px var(--gold-glow);
            animation: breathe 3s ease-in-out infinite;
            text-align: center;
        }

        @media (max-width: 480px) { h1 { font-size: 1.8rem; } }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 25px var(--gold); }
        }

        .links-container { 
            width: 100%; max-width: 400px; 
        }

        .btn {
            display: block; 
            background: var(--army-green);
            backdrop-filter: blur(5px);
            color: var(--gold); text-decoration: none;
            padding: 16px; margin: 12px 0;
            border-radius: 50px; border: 2px solid var(--gold);
            font-weight: bold; text-transform: uppercase;
            text-align: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            opacity: 0; transform: translateY(20px);
            letter-spacing: 1px;
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .btn:hover {
            background: var(--gold); color: #000;
            box-shadow: 0 0 25px var(--gold); transform: translateY(-3px) scale(1.02);
        }

        #mute-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.5); color: var(--gold);
            border: 1px solid var(--gold); padding: 10px 15px;
            border-radius: 30px; cursor: pointer; z-index: 100;
            font-size: 0.9rem; transition: 0.3s;
        }
        #mute-btn:hover { background: var(--gold); color: var(--army-green); }

        .star-icon { font-size: 40px; color: var(--gold); text-shadow: 0 0 15px var(--gold); }

        /* Hiệu ứng sao bay nền */
        #star-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .star { position: absolute; color: #fff; opacity: 0; animation: starMove linear infinite; }
        @keyframes starMove {
            0% { transform: translateY(105vh); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video"></video>

    <div class="overlay"></div>
    <div id="star-field"></div>
    
    <audio id="bg-music" loop>
        <source id="music-source" type="audio/mpeg">
    </audio>

    <button id="mute-btn">🎵 BẬT NHẠC</button>

    <div class="container">
        <div class="star-icon">★</div>
        <h1 id="display-name"></h1>
        <div class="links-container" id="links-list"></div>
    </div>

    <script>
        // Load cấu hình
        document.getElementById('display-name').innerText = USER_CONFIG.userName;
        
        const video = document.getElementById('bg-video');
        const music = document.getElementById('bg-music');

        // Cấu hình video chuẩn để vượt qua bộ lọc trình duyệt
        video.muted = true;
        video.setAttribute('playsinline', '');
        video.setAttribute('webkit-playsinline', '');
        video.src = USER_CONFIG.videoFile;

        document.getElementById('music-source').src = USER_CONFIG.musicFile;
        video.load();
        music.load();

        // Tạo nút bấm với hiệu ứng trễ (delay)
        const listContainer = document.getElementById('links-list');
        USER_CONFIG.links.forEach((link, index) => {
            const a = document.createElement('a');
            a.href = link.url;
            a.className = 'btn';
            a.target = "_blank";
            a.innerText = link.label;
            a.style.animationDelay = (0.2 * index) + "s";
            listContainer.appendChild(a;
        });

        // Tạo sao bay ngẫu nhiên (Cải tiến chiều sâu)
        for (let i = 0; i < 20; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.innerText = '★';
            const size = Math.random() * 10 + 5;
            s.style.left = Math.random() * 100 + "vw";
            s.style.animationDuration = (Math.random() * 3 + 4) + "s";
            s.style.animationDelay = (Math.random() * 8) + "s";
            s.style.fontSize = size + "px";
            s.style.filter = `blur(${size > 10 ? 1 : 0}px)`;
            document.getElementById('star-field').appendChild(s);
        }

        // Xử lý bật nhạc/video khi click
        const muteBtn = document.getElementById('mute-btn');
        
        const startMedia = () => {
            video.play().catch(e => console.error("Video play error:", e));
            if (music.paused) {
                music.play().catch(e => console.error("Music play error:", e));
                muteBtn.innerText = "🔊 TẮT NHẠC";
            }
        };

        // Kích hoạt ngay khi có tương tác đầu tiên
        document.body.addEventListener('touchstart', startMedia, { once: true });
        document.body.addEventListener('click', startMedia, { once: true });

        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (music.paused) {
                music.play();
                muteBtn.innerText = "🔊 TẮT NHẠC";
            } else {
                music.pause();
                muteBtn.innerText = "🎵 BẬT NHẠC";
            }
        });

        // Ép video play lại nếu trình duyệt tạm dừng do tiết kiệm pin
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) video.play();
        });

        // Khắc phục lỗi autoplay trên một số trình duyệt kén chọn
        video.addEventListener('loadedmetadata', () => {
            video.play().catch(() => {
                console.log("Autoplay bị chặn, chờ người dùng tương tác...");
            });
        });

        // Kiểm tra lỗi file
        video.onerror = () => {
            console.error("Không thể tải file video: " + USER_CONFIG.videoFile + ". Vui lòng kiểm tra lại tên file!");
        };
    </script>
</body>
</html>
